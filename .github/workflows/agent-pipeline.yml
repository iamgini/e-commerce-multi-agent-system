name: Agent Pipeline

on:
  push:
    branches:
      - main
      - dev
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # - name: Add dotenvx and run tests
      #   run: |
      #        curl -sfS https://dotenvx.sh/install.sh | sh
      #        dotenvx run -- python tests/test_order_inventory_state.py
      #   env:
      #     DOTENV_PRIVATE_KEY_CI: ${{ secrets.DOTENV_PRIVATE_KEY_CI }}

  secret-detection:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint agents files
        run: ruff check agents/

  vulnerability-scan:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan dependencies for vulnerabilities
        run: pip-audit -r requirements.txt --ignore-vuln CVE-2026-35029 --ignore-vuln CVE-2026-35030 --ignore-vuln GHSA-69x8-hrgq-fjj8

  build-and-push:
    # needs: [secret-detection, lint, vulnerability-scan]  # only build if all checks pass
    needs: [secret-detection, vulnerability-scan]  # only build if all checks pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'  # only deploy from main
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Quay
        run: echo "${{ secrets.QUAY_PASSWORD }}" | podman login quay.io -u "${{ secrets.QUAY_USERNAME }}" --password-stdin

      - name: Generate image tag
        id: meta
        run: echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build image
        # run: podman build --file Containerfile-ShopBot -t quay.io/iamgini/shopbot:${{ github.sha }} -t quay.io/iamgini/shopbot:latest .
        run: |
          podman build --build-arg GUARDRAILS_TOKEN=$GUARDRAILS_TOKEN \
            --file Containerfile-ShopBot \
            -t quay.io/iamgini/shopbot:${{ steps.meta.outputs.version }} \
            -t quay.io/iamgini/shopbot:latest \
            .

      - name: Push image
        run: |
          podman push quay.io/iamgini/shopbot:${{ steps.meta.outputs.version }}
          podman push quay.io/iamgini/shopbot:latest
    env:
      GUARDRAILS_TOKEN: ${{ secrets.GUARDRAILS_TOKEN }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # && vars.EC2_READY == 'true'
    steps:
      # - name: Deploy to EC2
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.EC2_HOST }}
      #     username: ec2-user
      #     key: ${{ secrets.EC2_SSH_KEY }}
      #     script: |
      #       podman pull quay.io/iamgini/shopbot:latest
      #       podman stop shopbot || true
      #       podman rm shopbot || true
      #       podman run -d \
      #         --name shopbot \
      #         --env-file /home/ec2-user/.env \
      #         --network host \
      #         -p 8001:8001 \
      #         quay.io/iamgini/shopbot:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOTENV_PRIVATE_KEY_CI,OPENAI_API_KEY        # ← pass to remote shell
          script: |
            IMAGE=quay.io/iamgini/shopbot:${{ needs.build-and-push.outputs.image_tag }}

            docker pull $IMAGE
            docker stop shopbot || true
            docker rm shopbot || true

            docker run -d \
              --name shopbot \
              --network pg_net \
              --network garage_net \
              -p 8001:8001 \
              -e DOTENV_PRIVATE_KEY_CI=$DOTENV_PRIVATE_KEY_CI \
              -e OPENAI_API_KEY=$OPENAI_API_KEY \
              $IMAGE
        env:
          DOTENV_PRIVATE_KEY_CI: ${{ secrets.DOTENV_PRIVATE_KEY_CI }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
