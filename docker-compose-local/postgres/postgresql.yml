# Compose file for setting up postgres and adminer
# Use adminer to view and edit data in postgres
services:
  postgres:
    container_name: postgres
    image: docker.io/library/postgres:18-alpine
    restart: unless-stopped
    shm_size: 128mb
    ports:
      - 6432:5432
    networks:
      - pg_net
    volumes:
      - ./data:/var/lib/postgresql:rw
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: xxx # to define
      POSTGRES_DB: postgres

  adminer:
    container_name: adminer
    image: docker.io/library/adminer:latest
    restart: unless-stopped
    ports:
      - 8081:8080
    networks:
      - pg_net

networks:
  pg_net:
    name: pg_net
    driver: bridge
